<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sahyog - Completed Deliveries</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #c97900;
            --bg: #f7efe3;
            --card-bg: rgba(255,255,255,0.8);
            --border: rgba(107, 69, 24, 0.12);
            --text-main: #2c2014;
            --text-muted: #77604a;
            --radius: 20px;
            --shadow: 0 20px 50px rgba(73, 44, 13, 0.12);
        }
        body { font-family: 'Manrope', sans-serif; background: radial-gradient(circle at top left, rgba(255, 207, 135, 0.34), transparent 28%), linear-gradient(180deg, #fff8ee 0%, #f0e6d7 100%); color: var(--text-main); margin: 0; padding: 24px; }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; padding: 0 0 16px; border-bottom: 1px solid var(--border); }
        .header h1 { font-family: 'Fraunces', serif; font-size: 1.6rem; margin: 0; }
        
        .filter-card { background: var(--card-bg); padding: 18px; border-radius: var(--radius); border: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; box-shadow: var(--shadow); backdrop-filter: blur(14px); }
        input, select { padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.9rem; outline: none; flex: 1; min-width: 150px; }
        
        .btn { padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; font-size: 0.85rem; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: white; border: 1px solid var(--border); color: var(--text-main); }
        
        .table-container { background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--border); overflow-x: auto; box-shadow: var(--shadow); backdrop-filter: blur(14px); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #fff3df; padding: 12px 16px; text-align: left; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: var(--text-muted); border-bottom: 2px solid var(--border); }
        td { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 0.875rem; }
        tr:last-child td { border-bottom: none; }
        
        @media print {
            .filter-card, .btn, .back-btn { display: none !important; }
            body { padding: 0; background: white; }
            .table-container { border: none; box-shadow: none; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div style="display:flex; align-items:center; gap:12px;">
            <button class="btn btn-outline back-btn" onclick="window.location.href='delivery.html'"><i class="fas fa-arrow-left"></i></button>
            <h1>Completed Records</h1>
        </div>
        <div style="display:flex; gap:8px;">
            <button class="btn btn-outline" onclick="exportCSV()"><i class="fas fa-file-csv"></i> Export</button>
            <button class="btn btn-primary" onclick="printCompleted()"><i class="fas fa-print"></i> Print</button>
        </div>
    </div>

    <div class="filter-card">
        <input type="text" id="searchTrack" placeholder="Search Tracking ID" onkeyup="applyFilter()">
        <input type="date" id="searchDate" onchange="applyFilter()">
        <select id="paymentFilter" onchange="applyFilter()">
            <option value="">All Payments</option>
            <option value="COD">COD</option>
            <option value="Prepaid">Prepaid</option>
        </select>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Tracking ID</th>
                    <th>Booked</th>
                    <th>Completed</th>
                    <th>Payment</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script>
        const API_BASE = 'https://sahyogdeliverybackend.onrender.com';
        const token = localStorage.getItem('authToken');
        let deliveries = [];
        let filtered = [];

        async function loadData() {
            try {
                const r = await fetch(`${API_BASE}/delivery/completed`, {
                   headers: { 'Authorization': `Bearer ${token}` }
                });
                if (r.ok) {
                    deliveries = await r.json();
                    filtered = deliveries;
                    render(filtered);
                } else {
                    document.getElementById("tableBody").innerHTML = '<tr><td colspan="5" style="text-align:center;">Failed to load data</td></tr>';
                }
            } catch(e) {
                document.getElementById("tableBody").innerHTML = '<tr><td colspan="5" style="text-align:center;">Error loading data</td></tr>';
            }
        }

        function formatDate(d) {
            if (!d) return '-';
            const date = new Date(d);
            return date.toLocaleDateString('en-IN');
        }

        function formatISODate(d) {
            if (!d) return null;
            const date = new Date(d);
            return date.toISOString().split('T')[0];
        }

        function getPaymentDisplay(d) {
            if (d.paymentMethod !== 'COD') return 'Prepaid';
            if (d.codPaymentStatus === 'Paid - Cash') return `COD | Cash | Rs. ${d.billAmount || 0}`;
            if (d.codPaymentStatus === 'Paid - Online') return 'COD | Online';
            return `COD | ${d.codPaymentStatus || 'Pending'}${d.billAmount ? ` | Rs. ${d.billAmount}` : ''}`;
        }

        function getCompletionDate(d) {
            const cancelled = d.statusUpdates?.some(s => s.status === 'Cancelled');
            return cancelled ? d.updatedAt : d.completedAt;
        }

        function render(list) {
            const tbody = document.getElementById("tableBody");
            tbody.innerHTML = list.length ? list.map(d => {
                const cancelled = d.statusUpdates?.some(s => s.status === 'Cancelled');
                const tag = cancelled
                    ? `<span style="background:#e53935;color:#fff;padding:2px 8px;border-radius:20px;font-size:0.72rem;font-weight:700;">RTO</span>`
                    : `<span style="background:#2e7d32;color:#fff;padding:2px 8px;border-radius:20px;font-size:0.72rem;">DELIVERED</span>`;
                return `<tr style="${cancelled ? 'background:#fff3f3;' : ''}">
                    <td style="font-weight:600; color:var(--primary);">${d.trackingId}</td>
                    <td>${formatDate(d.createdAt)}</td>
                    <td>${formatDate(getCompletionDate(d))}</td>
                    <td><span style="font-weight:500;">${getPaymentDisplay(d)}</span></td>
                    <td>${tag}</td>
                </tr>`;
            }).join('') : '<tr><td colspan="5" style="text-align:center; padding:40px; color:var(--text-muted);">No records found</td></tr>';
        }

        function applyFilter() {
            const track = document.getElementById("searchTrack").value.toLowerCase();
            const date = document.getElementById("searchDate").value;
            const pay = document.getElementById("paymentFilter").value;

            filtered = deliveries.filter(d => {
                const mTrack = d.trackingId.toLowerCase().includes(track);
                const mDate = !date || formatISODate(getCompletionDate(d)) === date;
                const mPay = !pay || d.paymentMethod === pay;
                return mTrack && mDate && mPay;
            });
            render(filtered);
        }

        function exportCSV() {
            let csv = "Tracking ID,Booking Date,Delivery Date,Payment\n";
            filtered.forEach(d => {
                csv += `"${d.trackingId}","${formatDate(d.createdAt)}","${formatDate(getCompletionDate(d))}","${getPaymentDisplay(d)}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url; a.download = "Completed_Deliveries.csv"; a.click();
        }

        function printCompleted() {
            const rows = filtered.map(d => {
                const cancelled = d.statusUpdates?.some(s => s.status === 'Cancelled');
                return `<tr>
                    <td>${d.trackingId}</td>
                    <td>${formatDate(d.createdAt)}</td>
                    <td>${formatDate(getCompletionDate(d))}</td>
                    <td>${getPaymentDisplay(d)}</td>
                    <td>${cancelled ? 'RTO' : 'Delivered'}</td>
                </tr>`;
            }).join('');

            const win = window.open('', '_blank', 'width=1100,height=800');
            if (!win) return alert('Allow popups to print completed deliveries.');

            win.document.write(`
                <html>
                <head>
                    <title>Completed Deliveries</title>
                    <style>
                        body { font-family: Arial, sans-serif; padding: 24px; color: #1f2937; }
                        h2 { margin: 0 0 6px; }
                        p { margin: 0 0 18px; color: #6b7280; font-size: 13px; }
                        table { width: 100%; border-collapse: collapse; }
                        th, td { border: 1px solid #d1d5db; padding: 10px 12px; text-align: left; font-size: 13px; }
                        th { background: #f3f4f6; }
                    </style>
                </head>
                <body>
                    <h2>Sahyog Completed Deliveries</h2>
                    <p>Printed on ${new Date().toLocaleString('en-IN')}</p>
                    <table>
                        <thead>
                            <tr>
                                <th>Tracking ID</th>
                                <th>Booked</th>
                                <th>Completed</th>
                                <th>Payment</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>${rows || '<tr><td colspan="5">No records found</td></tr>'}</tbody>
                    </table>
                    <script>window.onload = () => { window.print(); };<\/script>
                </body>
                </html>
            `);
            win.document.close();
        }
    </script>

    <footer style="text-align:center; padding:18px 14px 24px; color:#64748b; font-size:0.82rem;">
        Copyright © <span id="footer-year"></span> Sahyog Medical Delivery Platform. All Rights Reserved. Built by Vedang Soni.
    </footer>
    <script>
        loadData();
        const footerYearEl = document.getElementById('footer-year');
        if (footerYearEl) footerYearEl.textContent = new Date().getFullYear();
    </script>
</body>
</html>
