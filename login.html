<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Sahyog Medical Delivery</title>
    <link rel="icon" href="/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="/favicon.png">
    <meta name="theme-color" content="#2563eb">
    <link rel="manifest" href="/manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #c97900;
            --primary-dark: #995700;
            --primary-light: #fff0d7;
            --bg: #f7f0e5;
            --text-main: #2c2014;
            --text-muted: #77604a;
            --white: #ffffff;
            --radius: 22px;
            --shadow: 0 24px 60px rgba(73, 44, 13, 0.16);
        }

        * { box-sizing: border-box; }
        body { 
            font-family: 'Manrope', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background:
                radial-gradient(circle at top left, rgba(255, 207, 135, 0.36), transparent 28%),
                linear-gradient(180deg, #fff8ee 0%, #f0e6d7 100%);
            color: var(--text-main);
        }

        .login-container {
            width: 100%;
            max-width: 430px;
            padding: 20px;
        }

        .login-card { 
            background: var(--white); 
            padding: 40px; 
            border-radius: var(--radius); 
            box-shadow: var(--shadow); 
            width: 100%; 
            border: 1px solid rgba(108, 70, 26, 0.12);
            backdrop-filter: blur(16px);
        }

        .logo-area {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-area img {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            margin-bottom: 12px;
            box-shadow: 0 8px 20px rgba(201, 121, 0, 0.2);
        }

        .logo-area h2 {
            margin: 0;
            font-family: 'Fraunces', serif;
            font-size: 1.8rem;
            color: var(--primary);
        }

        .logo-area p {
            margin: 5px 0 0 0;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 600; 
            font-size: 0.875rem;
            color: var(--text-main);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1rem;
        }

        input { 
            width: 100%; 
            padding: 12px 12px 12px 42px; 
            border: 1.5px solid #e2e8f0; 
            border-radius: 12px; 
            font-size: 1rem;
            transition: all 0.2s;
            outline: none;
            font-family: inherit;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-light);
        }

        .options-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 0.85rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--text-muted);
        }

        .remember-me input {
            width: 16px;
            height: 16px;
            margin: 0;
            cursor: pointer;
        }

        button { 
            width: 100%; 
            padding: 14px; 
            background-color: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 1rem; 
            font-weight: 700;
            transition: all 0.2s;
            font-family: 'Manrope', sans-serif;
            box-shadow: 0 12px 24px rgba(201, 121, 0, 0.22);
        }

        button:hover {
            background-color: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 16px 26px rgba(201, 121, 0, 0.28);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        #message { 
            margin-top: 20px; 
            text-align: center; 
            font-size: 0.875rem; 
            padding: 10px;
            border-radius: 8px;
            display: none;
        }

        .msg-error { background: #fee2e2; color: #991b1b; display: block !important; }
        .msg-success { background: #dcfce7; color: #166534; display: block !important; }
        .msg-info { background: #e0f2fe; color: #0369a1; display: block !important; }

        .footer {
            margin-top: 40px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.8rem;
            line-height: 1.6;
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .login-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <div class="logo-area">
                <img src="/favicon.png" alt="Sahyog Logo">
                <h2>Sahyog Medical</h2>
                <p>Delivery Management Portal</p>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">Username (Email)</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user-circle"></i>
                        <input type="text" id="email" placeholder="Enter your username" required autofocus>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="options-row">
                    <label class="remember-me">
                        <input type="checkbox" id="remember-me"> Remember me
                    </label>
                </div>
                
                <button type="submit" id="login-btn">Secure Login</button>
            </form>
            
            <div id="message"></div>
        </div>

        <div class="footer">
            <p>Copyright &copy; <span id="year"></span> Sahyog Medical Delivery Platform.<br>All Rights Reserved. Built by Vedang Soni.</p>
            <div style="margin-top: 10px;">
                <a href="/contact-us.html">Contact Us</a> |
                <a href="/terms-and-conditions.html">Terms</a> |
                <a href="/ship-and-delivery-policy.html">Shipping</a> |
                <a href="/refunds-and-cancellations.html">Refunds</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        // Check if username was remembered
        const savedEmail = localStorage.getItem('rememberedEmail');
        if (savedEmail) {
            document.getElementById('email').value = savedEmail;
            document.getElementById('remember-me').checked = true;
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('remember-me').checked;
            const messageDiv = document.getElementById('message');
            const loginBtn = document.getElementById('login-btn');

            messageDiv.textContent = 'Authenticating...';
            messageDiv.className = 'msg-info';
            loginBtn.disabled = true;

            try {
                const response = await fetch('https://sahyogdeliverybackend.onrender.com/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    messageDiv.className = 'msg-success';
                    messageDiv.textContent = 'Login successful! Redirecting...';

                    if (rememberMe) {
                        localStorage.setItem('rememberedEmail', email);
                    } else {
                        localStorage.removeItem('rememberedEmail');
                    }

                    localStorage.setItem('authToken', data.token);
                    localStorage.setItem('userName', data.name);
                    localStorage.setItem('userRole', data.role);

                    setTimeout(() => {
                        const target = data.role === 'admin' ? 'admin.html' : 
                                     data.role === 'manager' ? 'manager.html' : 'delivery.html';
                        window.location.href = target;
                    }, 800);
                } else {
                    messageDiv.className = 'msg-error';
                    messageDiv.textContent = data.message || 'Invalid credentials';
                    loginBtn.disabled = false;
                }
            } catch (err) {
                messageDiv.className = 'msg-error';
                messageDiv.textContent = 'Server connection failed. Check your network.';
                loginBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
