<!DOCTYPE html>
<html>
<head>
  <title>Cashfree Test</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body style="font-family: Arial; padding: 30px">

<h2>Cashfree QR Test</h2>

<label>Amount (₹):</label><br>
<input type="number" id="amount" value="1"><br><br>

<button onclick="createPayment()">Generate Payment QR</button>

<h3 id="status"></h3>
<div id="qrcode"></div>

<script>
const API = "https://sahyogdeliverybackend.onrender.com";

async function createPayment() {
  const amount = document.getElementById("amount").value;

  document.getElementById("status").innerText = "Creating order...";

  try {
    const res = await fetch(API + "/api/cod/create-cashfree-order", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        trackingId: "TEST" + Date.now(),
        amount: Number(amount),
        customerPhone: "9999999999"
      })
    });

    const data = await res.json();
    console.log("Cashfree Response:", data);

    if (!res.ok) {
      throw new Error(data.message || "Order failed");
    }

    const sessionId = data.payment_session_id || data.sessionId;

    const paymentUrl = `https://sandbox.cashfree.com/pg/view/${sessionId}`;

    document.getElementById("status").innerText = "Scan QR to Pay";

    document.getElementById("qrcode").innerHTML = "";
    new QRCode(document.getElementById("qrcode"), paymentUrl);

    console.log("Payment URL:", paymentUrl);

  } catch (err) {
    console.error(err);
    document.getElementById("status").innerText = "Error: " + err.message;
  }
}
</script>

</body>
</html>
