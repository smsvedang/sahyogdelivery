<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="google-site-verification" content="sUd2hKr4JhoLKMQku6aNRgVeSmyvtjQcuT6ZB4aagRQ" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Your Order</title>
    <link rel="icon" href="/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="/favicon.png">

    <meta name="theme-color" content="#f1c27d">
    <link rel="manifest" href="/manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
   
   <style>
        body { font-family: 'Manrope', system-ui, sans-serif; padding: 24px; background: radial-gradient(circle at top left, rgba(255, 207, 135, 0.34), transparent 28%), linear-gradient(180deg, #fff8ee 0%, #efe4d3 100%); min-height: 100vh; color: #2c2014; }
        .track-container { max-width: 680px; margin: 28px auto; background: rgba(255,255,255,0.82); padding: 34px; border-radius: 28px; box-shadow: 0 24px 60px rgba(73, 44, 13, 0.12); border: 1px solid rgba(107, 69, 24, 0.12); backdrop-filter: blur(16px); }
        h1 { text-align: center; color: #2c2014; margin-bottom: 25px; font-weight: 700; font-family: Georgia, 'Times New Roman', serif; font-size: 2.4rem; letter-spacing: -0.04em; }
        input { width: 100%; padding: 14px; font-size: 16px; border: 1px solid rgba(107, 69, 24, 0.14); border-radius: 14px; transition: border-color 0.3s, box-shadow 0.3s; margin-bottom: 12px; }
        input:focus { outline: none; border-color: #c97900; box-shadow: 0 0 0 4px rgba(201,121,0,0.12); }
        button { padding: 14px 25px; font-size: 16px; background: linear-gradient(135deg, #c97900, #995700); color: white; border: none; border-radius: 14px; cursor: pointer; font-weight: 700; transition: transform 0.2s, box-shadow 0.3s; width: 100%; box-shadow: 0 14px 24px rgba(201,121,0,0.2); }
        button:hover { transform: translateY(-1px); box-shadow: 0 18px 28px rgba(201,121,0,0.24); }
        
        /* Progress Stepper */
        .stepper { display: flex; justify-content: space-between; margin-bottom: 40px; position: relative; }
        .stepper::before { content: ''; position: absolute; top: 15px; left: 0; right: 0; height: 3px; background: #ead9bf; z-index: 1; }
        .step { position: relative; z-index: 2; text-align: center; width: 20%; }
        .step-icon { width: 32px; height: 32px; background: #f6ebd8; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 8px; color: #9b7a49; font-size: 14px; border: 3px solid #fff; }
        .step.active .step-icon { background: #c97900; color: white; }
        .step.active .step-text { color: #995700; font-weight: 700; }
        .step-text { font-size: 11px; color: #777; }

        /* Timeline Styles */
        .timeline { list-style: none; padding: 0; margin-top: 30px; }
        .timeline li {
            position: relative;
            padding: 0 0 25px 45px;
            border-left: 2px solid #e0e0e0;
            margin-left: 15px;
        }
        .timeline li:last-child { border-left-color: transparent; }
        .timeline li::before {
            content: '';
            position: absolute;
            left: -9px;
            top: 5px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background-color: #fff;
            border: 3px solid #c97900;
            z-index: 2;
        }
        .status-card { background: #fffcf6; padding: 12px 15px; border-radius: 14px; border-left: 4px solid #c97900; box-shadow: 0 10px 18px rgba(98, 61, 17, 0.06); }
        .status-title { display: block; font-size: 1.05em; font-weight: 700; color: #333; margin-bottom: 2px; }
        .status-time { font-size: 0.85em; color: #636e72; }
        .status-icon-inline { position: absolute; left: -35px; top: 0px; background: #c97900; color: #fff; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; transform: translateX(10px); z-index: 3; }
        
        .boy-details { background: #fff4df; padding: 15px; border-radius: 16px; margin-bottom: 20px; display: flex; align-items: center; gap: 15px; border: 1px solid #f2cf9a; }
        .boy-details i { font-size: 24px; color: #995700; }
    </style>
</head>
<body>
    <div class="track-container">
        <h1>Track Your Order Here</h1>
        <input type="text" id="tracking-id" placeholder="Enter Tracking ID (e.g. SAHYOG-...)">
        <button id="track-btn">Track</button>
        <div id="status-result"></div>
    </div>

    <script>
        document.getElementById('track-btn').addEventListener('click', async function() {
            const trackingId = document.getElementById('tracking-id').value.trim();
            const resultDiv = document.getElementById('status-result');
            if (!trackingId) {
                resultDiv.innerHTML = "<p style='color:red;'>कृपया ट्रैकिंग ID डालें।</p>"; return;
            }
            resultDiv.innerHTML = "स्टेटस पता किया जा रहा है...";
            try {
                const response = await fetch(`https://sahyogdeliverybackend.onrender.com/track/${trackingId}`);
                if (response.ok) {
                    const data = await response.json();
                    const statusIcons = {
                        'Booked': 'fa-file-invoice',
                        'Dispatched from Head Office': 'fa-truck-moving',
                        'Received at Branch': 'fa-warehouse',
                        'Boy Assigned': 'fa-user-tag',
                        'Picked Up': 'fa-box',
                        'Out for Delivery': 'fa-motorcycle',
                        'Delivered': 'fa-circle-check',
                        'Cancelled': 'fa-circle-xmark',
                        'Rescheduled': 'fa-calendar-day'
                    };

                    let statusHTML = '<ul class="timeline">';
                    data.statusUpdates.slice().reverse().forEach((update, idx) => {
                        const date = new Date(update.timestamp).toLocaleString('en-IN', { day: 'numeric', month: 'short', hour: 'numeric', minute: '2-digit' });
                        const icon = statusIcons[update.status] || 'fa-dot-circle';
                        statusHTML += `
                            <li>
                                <div class="status-icon-inline"><i class="fas ${icon}"></i></div>
                                <div class="status-card" style="border-left-color: ${update.status==='Cancelled'?'#e74c3c':(update.status==='Delivered'?'#2ecc71':'#007bff')}">
                                    <span class="status-title">${update.status}</span>
                                    <span class="status-time"><i class="far fa-clock"></i> ${date}</span>
                                    ${update.remarks ? `<p style="margin:5px 0 0; font-size:0.85em; color:#d63031;">${update.remarks}</p>` : ''}
                                </div>
                            </li>`;
                    });
                    statusHTML += '</ul>';

                    // --- Stepper Progress ---
                    const mainStages = ['Booked', 'Received at Branch', 'Out for Delivery', 'Delivered'];
                    let stepperHTML = '<div class="stepper">';
                    mainStages.forEach(stage => {
                        const isDone = data.statusUpdates.some(s => s.status === stage);
                        stepperHTML += `
                            <div class="step ${isDone ? 'active' : ''}">
                                <div class="step-icon"><i class="fas ${statusIcons[stage]}"></i></div>
                                <div class="step-text">${stage.replace('Received at Branch','Branch')}</div>
                            </div>`;
                    });
                    stepperHTML += '</div>';

                    // --- Boy Details ---
                    let boyInfoHTML = '';
                    if (data.assignedBoyDetails?.name) {
                         const showBoyStatus = ['Boy Assigned', 'Picked Up', 'Out for Delivery', 'Delivered', 'Rescheduled'];
                         if (data.statusUpdates.some(s => showBoyStatus.includes(s.status))) {
                             boyInfoHTML = `
                                <div class="boy-details">
                                    <i class="fas fa-motorcycle"></i>
                                    <div>
                                        <div style="font-size:0.8em; color:#666;">Delivery Agent</div>
                                        <div style="font-weight:700;">${data.assignedBoyDetails.name}</div>
                                        ${data.assignedBoyDetails.phone ? `<a href="tel:${data.assignedBoyDetails.phone}" style="text-decoration:none; color:#007bff; font-size:0.9em;"><i class="fas fa-phone-alt"></i> ${data.assignedBoyDetails.phone}</a>` : ''}
                                    </div>
                                </div>`;
                         }
                    }

                    // --- Cancellation/Reschedule Request ---
                    let otpHTML = '';
                    if (data.isCancellationRequested && !['Delivered','Cancelled'].includes(data.currentStatus)) {
                        otpHTML = `
                            <div style="background: #fff3cd; border: 1px solid #ffeeba; padding: 15px; border-radius: 12px; margin-bottom: 20px; color: #856404;">
                                <div style="display:flex; align-items:center; gap:10px; font-weight:700;">
                                    <i class="fas fa-exclamation-triangle"></i> Action Required
                                </div>
                                <p style="margin: 8px 0 0; font-size: 0.9em;">Security verify karne ke liye Admin ko sampark karein. OTP unke paas bhej diya gaya hai.</p>
                            </div>
                        `;
                    }

                    resultDiv.innerHTML = `
                        <div style="margin-bottom:20px; text-align:center;">
                            <div style="font-size:0.9em; color:#777;">Tracking ID: ${data.trackingId}</div>
                            <div style="font-size:1.2em; font-weight:700;">Hello, ${data.customerName || 'Customer'}</div>
                        </div>
                        ${stepperHTML}
                        ${boyInfoHTML}
                        ${otpHTML}
                        ${statusHTML}
                    `;
                } else {
                    const data = await response.json();
                    resultDiv.innerHTML = `<p style='color:red;'><strong>गड़बड़ी:</strong> ${data.message}</p>`;
                }
            } catch (error) { resultDiv.innerHTML = `<strong>सर्वर से कनेक्ट नहीं हो पा रहा है।</strong>`; }
        });

/* ===== AUTO FILL TRACKING ID FROM URL ===== */
document.addEventListener("DOMContentLoaded", () => {
    const params = new URLSearchParams(window.location.search);
    const tid = params.get("id") || params.get("tid"); // Supports both ?id= and ?tid=

    if (tid) {
        const input = document.getElementById("tracking-id");
        if (input) {
            input.value = tid;
        }

        // OPTIONAL: auto click Track button
        const trackBtn = document.getElementById("track-btn");
        if (trackBtn) {
            trackBtn.click();
        }
    }
});
        // Add copyright year logic
        const yearEl = document.getElementById('copyright-year');
        if(yearEl) yearEl.textContent = new Date().getFullYear();
    </script>
    <div class="footer" style="text-align: center; margin-top: 30px; color: #888; font-size: 0.9em;">
        Copyright © <span id="copyright-year"></span> Sahyog Medical Delivery Platform. All Rights Reserved. Built by Vedang Soni.

            <a href="/terms-and-conditions.html">Terms &amp; Conditions</a> |
            <a href="/ship-and-delivery-policy.html">Ship &amp; Delivery Policy</a> |
            <a href="/refunds-and-cancellations.html">Refunds &amp; Cancellations</a>
        </div>
    </div>
     <script> document.getElementById('copyright-year').textContent = new Date().getFullYear(); </script>
</body>
</html>
